<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lanshi 视频商店</title>
    <meta name="description" content="单个视频微信扫码购买，付款后下载">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">LS</span>
          <div>
            <h1>Lanshi 视频商店</h1>
            <p>每个视频 5 元，微信扫码购买后下载</p>
          </div>
        </div>
        <div class="stats" aria-live="polite">
          <span id="videoCount">读取素材中</span>
          <span id="purchaseCount">0 已购买</span>
        </div>
      </header>

      <main class="layout">
        <aside class="filters" aria-label="筛选">
          <label class="field">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="输入片名或系列">
          </label>

          <label class="field">
            <span>系列</span>
            <select id="seriesFilter">
              <option value="">全部系列</option>
            </select>
          </label>

          <label class="field">
            <span>排序</span>
            <select id="sortSelect">
              <option value="title">按片名</option>
              <option value="newest">最新更新</option>
              <option value="sizeHigh">文件从大到小</option>
            </select>
          </label>

          <div class="notice">
            <strong>购买规则</strong>
            <p>单个视频统一 5 元。付款成功后，当前浏览器会获得下载权限。</p>
          </div>

          <div class="notice subtle">
            <strong>本地说明</strong>
          <p id="paymentNotice">本地默认使用 pay.jpg 作为微信收款码。付款后在卖家后台确认收款，即可开放下载。</p>
          </div>
        </aside>

        <section class="catalog-panel" aria-label="视频列表">
          <div class="catalog-header">
            <div>
              <h2>全部视频</h2>
              <p id="resultSummary">正在整理素材库</p>
            </div>
            <button id="refreshButton" class="ghost-button" type="button">刷新素材</button>
          </div>

          <div id="catalogGrid" class="catalog-grid"></div>
          <button id="loadMoreButton" class="load-more" type="button" hidden>加载更多</button>
        </section>
      </main>
    </div>

    <div id="ageGate" class="overlay" role="dialog" aria-modal="true" aria-labelledby="ageTitle">
      <div class="dialog compact">
        <h2 id="ageTitle">内容访问确认</h2>
        <p>请确认你已年满 18 岁，并拥有展示、销售这些视频素材的合法权利。</p>
        <button id="ageConfirm" class="primary-button" type="button">我确认并进入</button>
      </div>
    </div>

    <div id="paymentModal" class="overlay" role="dialog" aria-modal="true" aria-labelledby="paymentTitle" hidden>
      <div class="dialog payment-dialog">
        <button class="close-button" type="button" data-close="paymentModal" aria-label="关闭">×</button>
        <div class="dialog-heading">
          <span class="status-pill">微信扫码支付</span>
          <h2 id="paymentTitle">购买视频</h2>
          <p id="paymentSubtitle"></p>
        </div>
        <div class="payment-body">
          <div class="pay-code-frame">
            <img id="payImage" class="pay-image" alt="微信收款码" hidden>
            <canvas id="qrCanvas" width="220" height="220" aria-label="微信支付二维码"></canvas>
          </div>
          <div>
            <p class="amount" id="paymentAmount">¥5.00</p>
            <p class="muted" id="paymentHelp">请使用微信扫码支付。付款成功后，下载按钮会自动出现。</p>
            <p class="order-status" id="orderStatus">等待创建订单</p>
            <div class="payment-actions">
              <button id="mockPaidButton" class="primary-button" type="button" hidden>本机确认已收款</button>
              <button id="downloadAfterPayButton" class="ghost-button" type="button" hidden>下载视频</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <template id="cardTemplate">
      <article class="video-card">
        <div class="thumb-wrap">
          <img class="thumb" alt="" loading="lazy">
          <div class="thumb-fallback"></div>
          <span class="lock-badge">未购买</span>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <span class="series"></span>
            <span class="size"></span>
          </div>
          <h3></h3>
          <div class="card-footer">
            <span class="price">¥5.00</span>
            <button class="primary-button card-action" type="button"></button>
          </div>
        </div>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
