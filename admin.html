<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lanshi 卖家后台</title>
    <meta name="description" content="Lanshi 本地订单确认后台">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell admin-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">LS</span>
          <div>
            <h1>卖家后台</h1>
            <p>确认微信收款后，买家页面会自动解锁下载。</p>
          </div>
        </div>
        <a class="ghost-button" href="/">返回商店</a>
      </header>

      <main class="admin-layout">
        <section class="admin-panel">
          <div class="catalog-header">
            <div>
              <h2>订单确认</h2>
              <p id="adminSummary">输入确认码后读取订单</p>
            </div>
            <button id="adminRefresh" class="ghost-button" type="button">刷新订单</button>
          </div>

          <div class="admin-controls">
            <label class="field">
              <span>卖家确认码</span>
              <input id="adminToken" type="password" placeholder="默认 lanshi-local-admin" autocomplete="current-password">
            </label>
            <label class="field">
              <span>状态</span>
              <select id="adminStatus">
                <option value="pending">待确认</option>
                <option value="paid">已支付</option>
                <option value="">全部订单</option>
              </select>
            </label>
          </div>

          <div id="adminOrders" class="admin-orders"></div>
        </section>
      </main>
    </div>

    <template id="adminOrderTemplate">
      <article class="admin-order">
        <div>
          <div class="card-meta">
            <span class="order-id"></span>
            <span class="order-time"></span>
          </div>
          <h3></h3>
          <p class="muted order-file"></p>
        </div>
        <div class="admin-order-side">
          <span class="price"></span>
          <span class="status-pill order-status-pill"></span>
          <button class="primary-button confirm-order" type="button">确认已收款</button>
        </div>
      </article>
    </template>

    <script src="/admin.js"></script>
  </body>
</html>
